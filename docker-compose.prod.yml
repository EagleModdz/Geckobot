version: "3.9"

# ┌─────────────────────────────────────────────────────────────┐
# │  GeckoBot — Production                                      │
# │                                                             │
# │  Minimal setup (one env var):                               │
# │    TS3_SERVER=your-server.com:9987 docker compose up -d     │
# │                                                             │
# │  Admin password is auto-generated and printed in the logs:  │
# │    docker compose logs backend | grep -A5 "First Run"       │
# │                                                             │
# │  Set GHCR_IMAGE_PREFIX to your registry path, e.g.:        │
# │    ghcr.io/eaglemoddz/geckobot                              │
# └─────────────────────────────────────────────────────────────┘

services:
  frontend:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/eaglemoddz/geckobot}-frontend:${VERSION:-latest}
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/eaglemoddz/geckobot}-backend:${VERSION:-latest}
    ports:
      - "3001:3001"
    depends_on:
      ts3audiobot:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: .env
        required: false
    environment:
      # ts3audiobot runs with network_mode: host, so reachable via host gateway
      - TS3AUDIOBOT_URL=http://host.docker.internal:58913
    volumes:
      - ./data/backend:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  ts3audiobot:
    image: ${GHCR_IMAGE_PREFIX:-ghcr.io/eaglemoddz/geckobot}-ts3audiobot:${VERSION:-latest}
    # Host networking: bot shares host network stack, can reach any service
    # on the host (including TS3 server in Pterodactyl/Docker) via localhost
    network_mode: host
    environment:
      - TS3_SERVER=${TS3_SERVER:-}
    volumes:
      - ./data/ts3audiobot:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:58913/api"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
