version: "3.9"

# Production compose — uses pre-built images from ghcr.io.
# Set GHCR_IMAGE_PREFIX in .env, e.g.: ghcr.io/yourusername/musicbot
# Set VERSION in .env or pass it directly: VERSION=v1.2.0 docker compose -f docker-compose.prod.yml up -d

services:
  frontend:
    image: ${GHCR_IMAGE_PREFIX}-frontend:${VERSION:-latest}
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    image: ${GHCR_IMAGE_PREFIX}-backend:${VERSION:-latest}
    ports:
      - "3001:3001"
    depends_on:
      ts3audiobot:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - TS3AUDIOBOT_URL=http://ts3audiobot:58913
    volumes:
      - ./data/backend:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  ts3audiobot:
    image: ${GHCR_IMAGE_PREFIX}-ts3audiobot:${VERSION:-latest}
    ports:
      - "58913:58913"
    volumes:
      - ./data/ts3audiobot:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:58913/api"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
