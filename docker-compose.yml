version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    # VITE_ vars are baked in at build time via Dockerfile ARGs.
    # nginx proxies /api and /socket.io to backend, so no hardcoded URL needed.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      ts3audiobot:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      - TS3AUDIOBOT_URL=http://ts3audiobot:58913
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  ts3audiobot:
    build:
      context: .
      dockerfile: ts3audiobot/Dockerfile
    ports:
      - "58913:58913"
    environment:
      - TS3_SERVER=${TS3_SERVER:-}
    volumes:
      - ts3audiobot-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:58913/api"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  backend-data:
  ts3audiobot-data:
