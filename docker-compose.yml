version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://localhost:3001
      - VITE_WS_URL=http://localhost:3001

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      ts3audiobot:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - TS3AUDIOBOT_URL=http://ts3audiobot:58913
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  ts3audiobot:
    build:
      context: ./ts3audiobot
      dockerfile: Dockerfile
    volumes:
      - ts3audiobot-data:/app/data
    environment:
      - TS3_SERVER_HOST=${TS3_SERVER_HOST:-localhost}
      - TS3_SERVER_PORT=${TS3_SERVER_PORT:-9987}
    network_mode: host
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:58913/api"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  backend-data:
  ts3audiobot-data:
