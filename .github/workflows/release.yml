name: Build & Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub Release
      packages: write   # push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # ── Frontend ──────────────────────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.ref_name }}
            ${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      # ── Backend ───────────────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:${{ github.ref_name }}
            ${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      # ── TS3AudioBot ───────────────────────────────────────────────────────
      - name: Build & push ts3audiobot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ts3audiobot/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-ts3audiobot:${{ github.ref_name }}
            ${{ env.IMAGE_PREFIX }}-ts3audiobot:latest
          cache-from: type=gha,scope=ts3audiobot
          cache-to: type=gha,scope=ts3audiobot,mode=max

      # ── GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker Images

            ```bash
            # Pull all images
            docker compose -f docker-compose.prod.yml pull

            # Or pull a specific version
            VERSION=${{ github.ref_name }} docker compose -f docker-compose.prod.yml pull
            ```
