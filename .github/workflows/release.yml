name: Build & Release

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create tag + GitHub Release
      packages: write   # push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Determine next version
        id: version
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=${LATEST#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Bumped $LATEST → $NEW_TAG"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # ── Frontend ──────────────────────────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      # ── Backend ───────────────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      # ── TS3AudioBot ───────────────────────────────────────────────────────
      - name: Build & push ts3audiobot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ts3audiobot/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-ts3audiobot:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-ts3audiobot:latest
          cache-from: type=gha,scope=ts3audiobot
          cache-to: type=gha,scope=ts3audiobot,mode=max

      # ── GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          body: |
            ## Docker Images

            ```bash
            # Pull all images
            docker compose -f docker-compose.prod.yml pull

            # Or pull a specific version
            VERSION=${{ steps.version.outputs.tag }} docker compose -f docker-compose.prod.yml pull
            ```
